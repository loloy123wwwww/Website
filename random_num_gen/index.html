<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <link rel="icon" href="" type="image/jpeg">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .container {
            background-color: rgb(161, 158, 158);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        .input {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: center;
            margin-bottom: 10px;
            padding: 5px;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            height: 50px;
            font-size: 24px;
            background-color: #2b1616;
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #351c1c;
        }
        .output.error {
            color: rgb(255, 21, 21);
        }
        #backBtn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background-color: #252525;
            color: white;
            padding: 6px 12px;
            font-size: 11px;
            border: none;
            border-radius: 8px;
            cursor: pointer;  
            width: 90px;
            height: 40px;
        }
        #backBtn:hover {
            background-color: #2e2e2e;
        }
    </style>
</head>
<body>
    <button id="backBtn" onclick="window.location.href = '../';">Back</button>
    <h1>Random Number Generator</h1>
    <div class="container">
        <input type="number" id="min" class="input" placeholder="Min number">
        <input type="number" id="max" class="input" placeholder="Max number">
        <button onclick="generateRandom()">Generate</button>
        <div id="output" class="output"></div>
    </div>
    <script>
        function generateRandom() {
            const output = document.getElementById('output');
            output.classList.remove('error');
            
            const minVal = document.getElementById('min').value;
            const maxVal = document.getElementById('max').value;
            const min = parseInt(minVal);
            const max = parseInt(maxVal);
            
            if (minVal === '' || maxVal === '' || isNaN(min) || isNaN(max)) {
                output.textContent = 'Please enter valid numbers';
                output.classList.add('error');
                return;
            }
            
            if (min > max) {
                output.textContent = 'Minimum number cannot be larger than maximum';
                output.classList.add('error');
                return;
            }
            
            const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            output.textContent = randomNum;
        }
    </script>
</body>
</html>
